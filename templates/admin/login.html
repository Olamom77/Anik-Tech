<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Anik Tech</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/static/icons/favicon.png">
  <style>:root{--brand-primary:#185FA5;--brand-primary-dark:#0c447c;}</style>
</head>
<body style="background:#f4f6fb;display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div style="background:#fff;border-radius:16px;border:1px solid #e8e8e8;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.06);">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-family:'DM Serif Display',serif;font-size:26px;color:#1a1a1a;margin-bottom:4px;">Anik <span style="color:#185FA5;">Tech</span></div>
      <p style="font-size:13px;color:#888;background:#f4f6fb;display:inline-block;padding:3px 12px;border-radius:20px;">Admin Access</p>
    </div>
    <h2 style="text-align:center;font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:0.4rem;">Admin Login</h2>
    <p style="text-align:center;font-size:13px;color:#888;margin-bottom:1.5rem;">Sign in to manage students, grades, and content.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div style="margin-bottom:1rem;">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Enter admin username" required autofocus>
      </div>
      <div style="margin-bottom:1.5rem;">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;text-align:center;border:none;cursor:pointer;font-size:15px;padding:12px;">Sign In</button>
    </form>
    <div style="text-align:center;margin-top:1.5rem;font-size:13px;">
      <a href="/" style="color:#185FA5;">← Back to website</a>
      &nbsp;&nbsp;
      <a href="/student/login" style="color:#888;">Student Portal</a>
    </div>
  </div>
</body>
</html>
