<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal – Anik Tech</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/portal.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#185FA5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Anik Tech">
  <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
  <link rel="icon" type="image/png" href="/static/icons/favicon.png">
</head>
<body style="background:#f4f6fb;display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div style="background:#fff;border-radius:16px;border:1px solid #e8e8e8;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.06);">
    <div style="text-align:center;margin-bottom:2rem;">
      <a href="/" style="font-family:'DM Serif Display',serif;font-size:26px;color:#1a1a1a;text-decoration:none;">Anik <span style="color:#185FA5;">Tech</span></a>
      <p style="font-size:13px;color:#888;background:#f4f6fb;display:inline-block;padding:3px 12px;border-radius:20px;margin-top:6px;">Student Portal</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div style="margin-bottom:1rem;">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@aniktech.edu.ng" required autofocus>
      </div>
      <div style="margin-bottom:1.5rem;">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;text-align:center;border:none;cursor:pointer;font-size:15px;padding:12px;">Sign in to Portal</button>
    </form>
    <div style="text-align:center;margin-top:1.5rem;font-size:12px;color:#aaa;">
      <p>Demo: <strong>amara@aniktech.edu.ng</strong> / <strong>student123</strong></p>
      <p style="margin-top:0.5rem;"><a href="/" style="color:#185FA5;">← Back to website</a></p>
    </div>
  </div>
</body>
</html>
